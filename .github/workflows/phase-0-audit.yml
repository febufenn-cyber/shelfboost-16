name: phase-0-1-2-3-4-5

on:
  pull_request:
  push:
    branches:
      - main
      - agent/phase-0-discovery-system
      - agent/phase-1-concierge-pilot
      - agent/phase-2a-shopify-sync
      - agent/phase-2b-webhook-reconciliation
      - agent/phase-2c-phase1-bridge
      - agent/phase-3a-publish-planning
      - agent/phase-3b-safe-execution
      - agent/phase-3c-rollback-audit
      - agent/phase-4-production-foundation
      - agent/phase-5-merchant-experience

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Phase 0 unit tests
        run: python -m unittest discover -s prototypes/catalog-audit/tests -v
      - name: Phase 0 sample audit smoke test
        run: |
          python prototypes/catalog-audit/audit_catalog.py \
            prototypes/catalog-audit/sample/shopify-products.csv \
            --output-dir /tmp/shelfboost-audit
          test -s /tmp/shelfboost-audit/catalog-audit.csv
          test -s /tmp/shelfboost-audit/catalog-summary.json
      - name: Phase 1 unit tests
        run: PYTHONPATH=phase1 python -m unittest discover -s phase1/tests -v
      - name: Phase 1 synthetic pilot smoke test
        run: |
          ./phase1/run-demo.sh /tmp/shelfboost-phase1-demo
          test -s /tmp/shelfboost-phase1-demo/pilot.db
          test -s /tmp/shelfboost-phase1-demo/artifacts/batch-1-review/review.html
          test -s /tmp/shelfboost-phase1-demo/artifacts/batch-1-review/review-decisions.csv
      - name: Phase 2 unit tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase1:phase2 python -m unittest discover -s phase2/tests -v
      - name: Phase 2 read-only sync smoke test
        run: |
          ./phase2/run-demo.sh /tmp/shelfboost-phase2-demo
          test -s /tmp/shelfboost-phase2-demo/sync.db
          test "$(find /tmp/shelfboost-phase2-demo/snapshots -name '*.json' | wc -l)" -eq 3
          test -s /tmp/shelfboost-phase2-demo/exports/phase1-catalog.csv
          test -s /tmp/shelfboost-phase2-demo/exports/phase1-catalog.manifest.json
      - name: Phase 3 unit tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase1:phase2:phase3 python -m unittest discover -s phase3/tests -v
      - name: Phase 4 unit tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase4 python -m unittest discover -s phase4/tests -v
      - name: Phase 5 unit tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase4:phase5 python -m unittest discover -s phase5/tests -v
