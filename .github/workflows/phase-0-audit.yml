name: shelfboost-phases-0-8

on:
  pull_request:
  push:
    branches: [main, agent/phase-8-measurement-retention]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Phase 0 tests
        run: python -m unittest discover -s prototypes/catalog-audit/tests -v
      - name: Phase 0 smoke
        run: |
          python prototypes/catalog-audit/audit_catalog.py prototypes/catalog-audit/sample/shopify-products.csv --output-dir /tmp/shelfboost-audit
          test -s /tmp/shelfboost-audit/catalog-audit.csv
      - name: Phase 1 tests
        run: PYTHONPATH=phase1 python -m unittest discover -s phase1/tests -v
      - name: Phase 1 smoke
        run: ./phase1/run-demo.sh /tmp/shelfboost-phase1-demo
      - name: Phase 2 tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase1:phase2 python -m unittest discover -s phase2/tests -v
      - name: Phase 2 smoke
        run: ./phase2/run-demo.sh /tmp/shelfboost-phase2-demo
      - name: Phase 3 tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase1:phase2:phase3 python -m unittest discover -s phase3/tests -v
      - name: Phase 4 tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase4 python -m unittest discover -s phase4/tests -v
      - name: Phase 5 tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase4:phase5 python -m unittest discover -s phase5/tests -v
      - name: Phase 6 tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase4:phase6 python -m unittest discover -s phase6/tests -v
      - name: Phase 7 tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase4:phase7 python -m unittest discover -s phase7/tests -v
      - name: Phase 8 tests
        run: PYTHONWARNINGS=error::ResourceWarning PYTHONPATH=phase4:phase8 python -m unittest discover -s phase8/tests -v
